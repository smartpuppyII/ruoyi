<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动端API测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .test-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .test-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            border-left: 4px solid #ddd;
        }
        .test-item.success {
            border-left-color: #52c41a;
            background: #f6ffed;
        }
        .test-item.error {
            border-left-color: #ff4d4f;
            background: #fff1f0;
        }
        .test-item.testing {
            border-left-color: #faad14;
            background: #fffbe6;
        }
        .test-name {
            flex: 1;
            font-weight: 500;
        }
        .test-status {
            margin-left: 10px;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-success {
            background: #52c41a;
            color: white;
        }
        .status-error {
            background: #ff4d4f;
            color: white;
        }
        .status-testing {
            background: #faad14;
            color: white;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result-detail {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
            padding-left: 10px;
        }
        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .summary-card {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            color: white;
            text-align: center;
        }
        .summary-card h3 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        .summary-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        .card-total { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card-success { background: linear-gradient(135deg, #52c41a, #7dd956); }
        .card-error { background: linear-gradient(135deg, #ff4d4f, #ff7875); }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 移动端API测试工具</h1>
            <p style="color: #666; margin-top: 10px;">
                自动测试所有移动端API接口，检查功能是否正常
            </p>
            <div style="margin-top: 15px;">
                <button class="btn" onclick="runAllTests()">🚀 运行所有测试</button>
                <button class="btn" onclick="clearResults()">🗑️ 清除结果</button>
            </div>
        </div>

        <div class="summary" id="summary" style="display: none;">
            <div class="summary-card card-total">
                <h3 id="totalTests">0</h3>
                <p>总测试数</p>
            </div>
            <div class="summary-card card-success">
                <h3 id="successTests">0</h3>
                <p>成功</p>
            </div>
            <div class="summary-card card-error">
                <h3 id="errorTests">0</h3>
                <p>失败</p>
            </div>
        </div>

        <!-- 认证API -->
        <div class="test-section">
            <h2>🔐 认证API</h2>
            <div id="auth-tests"></div>
        </div>

        <!-- 设备管理API -->
        <div class="test-section">
            <h2>📱 设备管理API</h2>
            <div id="device-tests"></div>
        </div>

        <!-- 植被分析API -->
        <div class="test-section">
            <h2>🌿 植被分析API</h2>
            <div id="vegetation-tests"></div>
        </div>
    </div>

    <script>
        const tests = {
            auth: [
                {
                    name: '设备统计接口',
                    url: '/mobile/api/iot/devices/statistics',
                    method: 'GET',
                    needAuth: false
                }
            ],
            device: [
                {
                    name: '获取设备列表',
                    url: '/mobile/api/iot/devices?pageNum=1&pageSize=10',
                    method: 'GET',
                    needAuth: false
                },
                {
                    name: '获取设备统计',
                    url: '/mobile/api/iot/devices/statistics',
                    method: 'GET',
                    needAuth: false
                },
                {
                    name: '获取在线设备数量',
                    url: '/mobile/api/iot/devices/online/count',
                    method: 'GET',
                    needAuth: false
                }
            ],
            vegetation: [
                {
                    name: '获取植被分析列表',
                    url: '/mobile/api/vegetation/list?pageNum=1&pageSize=10',
                    method: 'GET',
                    needAuth: false
                },
                {
                    name: '获取植被统计',
                    url: '/mobile/api/vegetation/statistics',
                    method: 'GET',
                    needAuth: false
                }
            ]
        };

        let results = {
            total: 0,
            success: 0,
            error: 0
        };

        function createTestItem(name, id) {
            return `
                <div class="test-item" id="${id}">
                    <div class="test-name">${name}</div>
                    <div class="test-status status-testing">等待中</div>
                </div>
            `;
        }

        function updateTestStatus(id, status, message, data) {
            const item = document.getElementById(id);
            if (!item) return;

            item.className = `test-item ${status}`;
            const statusEl = item.querySelector('.test-status');
            
            if (status === 'success') {
                statusEl.className = 'test-status status-success';
                statusEl.textContent = '✓ 成功';
                results.success++;
            } else if (status === 'error') {
                statusEl.className = 'test-status status-error';
                statusEl.textContent = '✗ 失败';
                results.error++;
            } else {
                statusEl.className = 'test-status status-testing';
                statusEl.textContent = '⏳ 测试中';
            }

            // 添加详细信息
            let detailEl = item.querySelector('.result-detail');
            if (!detailEl) {
                detailEl = document.createElement('div');
                detailEl.className = 'result-detail';
                item.appendChild(detailEl);
            }
            detailEl.innerHTML = message || '';

            if (data && status === 'success') {
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data, null, 2);
                detailEl.appendChild(pre);
            }

            updateSummary();
        }

        function updateSummary() {
            document.getElementById('summary').style.display = 'flex';
            document.getElementById('totalTests').textContent = results.total;
            document.getElementById('successTests').textContent = results.success;
            document.getElementById('errorTests').textContent = results.error;
        }

        async function testAPI(test, id) {
            updateTestStatus(id, 'testing', '正在请求...');

            try {
                const options = {
                    method: test.method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };

                if (test.needAuth) {
                    const token = localStorage.getItem('token');
                    if (token) {
                        options.headers['Authorization'] = `Bearer ${token}`;
                    }
                }

                const response = await fetch(test.url, options);
                const data = await response.json();

                console.log(`API响应 [${test.name}]:`, data);

                if (response.ok && (data.code === 200 || data.code === 0)) {
                    const dataInfo = data.rows ? `返回 ${data.rows.length} 条数据` : 
                                     data.total !== undefined ? `总数: ${data.total}` :
                                     data.data ? '有数据返回' : '成功';
                    updateTestStatus(id, 'success', `HTTP ${response.status} - ${dataInfo}`, data);
                } else {
                    updateTestStatus(id, 'error', 
                        `HTTP ${response.status} - ${data.msg || '请求失败'}`, data);
                }
            } catch (error) {
                console.error(`API错误 [${test.name}]:`, error);
                updateTestStatus(id, 'error', `错误: ${error.message}`);
            }
        }

        async function runAllTests() {
            // 重置结果
            results = { total: 0, success: 0, error: 0 };

            // 生成测试项
            let testId = 0;
            const authContainer = document.getElementById('auth-tests');
            const deviceContainer = document.getElementById('device-tests');
            const vegetationContainer = document.getElementById('vegetation-tests');

            authContainer.innerHTML = '';
            deviceContainer.innerHTML = '';
            vegetationContainer.innerHTML = '';

            // 认证测试
            for (const test of tests.auth) {
                const id = `test-${testId++}`;
                authContainer.innerHTML += createTestItem(test.name, id);
                results.total++;
            }

            // 设备测试
            for (const test of tests.device) {
                const id = `test-${testId++}`;
                deviceContainer.innerHTML += createTestItem(test.name, id);
                results.total++;
            }

            // 植被测试
            for (const test of tests.vegetation) {
                const id = `test-${testId++}`;
                vegetationContainer.innerHTML += createTestItem(test.name, id);
                results.total++;
            }

            updateSummary();

            // 执行测试
            testId = 0;
            for (const test of tests.auth) {
                await testAPI(test, `test-${testId++}`);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            for (const test of tests.device) {
                await testAPI(test, `test-${testId++}`);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            for (const test of tests.vegetation) {
                await testAPI(test, `test-${testId++}`);
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            console.log('所有测试完成！');
            console.log(`总计: ${results.total}, 成功: ${results.success}, 失败: ${results.error}`);
        }

        function clearResults() {
            document.getElementById('auth-tests').innerHTML = '';
            document.getElementById('device-tests').innerHTML = '';
            document.getElementById('vegetation-tests').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            results = { total: 0, success: 0, error: 0 };
        }

        // 页面加载完成提示
        console.log('移动端API测试工具已就绪');
        console.log('点击"运行所有测试"按钮开始测试');
    </script>
</body>
</html>
