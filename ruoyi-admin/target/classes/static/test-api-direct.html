<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API直接测试</title>
</head>
<body>
    <h1>API测试</h1>
    <button onclick="testAPI()">测试统计API</button>
    <pre id="result"></pre>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('/mobile/api/iot/devices/statistics');
                const data = await response.json();
                
                document.getElementById('result').textContent = 
                    'HTTP Status: ' + response.status + '\n' +
                    'Response:\n' + JSON.stringify(data, null, 2);
                    
                console.log('Full response:', data);
                console.log('data.code:', data.code);
                console.log('data.code === 200:', data.code === 200);
                console.log('typeof data.code:', typeof data.code);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
