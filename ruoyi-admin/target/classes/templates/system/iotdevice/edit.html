<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改物联网设备')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-iotdevice-edit" th:object="${iotDevice}">
            <input name="deviceId" th:field="*{deviceId}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">设备名称：</label>
                <div class="col-sm-8">
                    <input name="deviceName" th:field="*{deviceName}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">设备类型：</label>
                <div class="col-sm-8">
                    <select name="deviceType" class="form-control" required>
                        <option value="">请选择</option>
                        <option value="temperature" th:selected="*{deviceType} == 'temperature'">温度传感器</option>
                        <option value="humidity" th:selected="*{deviceType} == 'humidity'">湿度传感器</option>
                        <option value="pressure" th:selected="*{deviceType} == 'pressure'">压力传感器</option>
                        <option value="modbus" th:selected="*{deviceType} == 'modbus'">Modbus设备</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">MQTT Broker：</label>
                <div class="col-sm-8">
                    <input name="mqttBroker" th:field="*{mqttBroker}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">发布主题：</label>
                <div class="col-sm-8">
                    <input name="mqttPubTopic" th:field="*{mqttPubTopic}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">订阅主题：</label>
                <div class="col-sm-8">
                    <input name="mqttSubTopic" th:field="*{mqttSubTopic}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">设备IP：</label>
                <div class="col-sm-8">
                    <input name="ipAddress" th:field="*{ipAddress}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">最后通信时间：</label>
                <div class="col-sm-8">
                    <input name="lastCommunication" th:field="*{lastCommunication}" class="form-control" type="text" readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">信号强度：</label>
                <div class="col-sm-8">
                    <input name="signalStrength" th:field="*{signalStrength}" class="form-control" type="text" readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">设备状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" name="status" value="0" th:checked="*{status} == '0'">
                        <label>正常</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" name="status" value="1" th:checked="*{status} == '1'">
                        <label>停用</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" th:text="*{remark}"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "system/iotdevice";

        $("#form-iotdevice-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-iotdevice-edit').serialize());
            }
        }
    </script>
</body>
</html>
