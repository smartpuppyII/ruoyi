<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增物联网设备')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-iotdevice-add">
            <h4 class="form-header h4">基本信息</h4>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">设备名称：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="deviceName" id="deviceName" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">设备类型：</label>
                <div class="col-sm-8">
                    <select name="deviceType" class="form-control m-b" required>
                        <option value="">请选择设备类型</option>
                        <option value="temperature">温度传感器</option>
                        <option value="humidity">湿度传感器</option>
                        <option value="pressure">压力传感器</option>
                        <option value="other">其他</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">MQTT主题：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="mqttTopic" id="mqttTopic">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">设备状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="status1" name="status" value="0" checked>
                        <label for="status1">正常</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="status2" name="status" value="1">
                        <label for="status2">停用</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea class="form-control" name="remark" id="remark"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "system/iotdevice";
        
        $("#form-iotdevice-add").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-iotdevice-add').serialize());
            }
        }
    </script>
</body>
</html>
