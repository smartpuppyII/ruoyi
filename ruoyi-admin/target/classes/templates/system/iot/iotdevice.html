<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('物联网设备管理')" />
	<th:block th:include="include :: layout-latest-css" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="iotdevice-form">
					<div class="select-list">
						<ul>
							<li>
								设备名称：<input type="text" name="deviceName"/>
							</li>
							<li>
								设备类型：<select name="deviceType">
									<option value="">所有</option>
									<option value="temperature">温度传感器</option>
									<option value="humidity">湿度传感器</option>
									<option value="pressure">压力传感器</option>
									<option value="other">其他</option>
								</select>
							</li>
							<li>
								设备状态：<select name="status">
									<option value="">所有</option>
									<option value="0">正常</option>
									<option value="1">停用</option>
								</select>
							</li>
							<li class="select-time">
								<label>创建时间： </label>
								<input type="text" class="time-input" id="startTime" placeholder="开始时间" name="params[beginTime]"/>
								<span>-</span>
								<input type="text" class="time-input" id="endTime" placeholder="结束时间" name="params[endTime]"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
								<a class="btn btn-warning btn-rounded btn-sm" onclick="resetPre()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
	        <div class="btn-group-sm" id="toolbar" role="group">
	        	<a class="btn btn-success" onclick="$.operate.addTab()" shiro:hasPermission="system:iotdevice:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	             <a class="btn btn-primary single disabled" onclick="$.operate.editTab()" shiro:hasPermission="system:iotdevice:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
	            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:iotdevice:remove">
	                <i class="fa fa-remove"></i> 删除
	            </a>
	            <a class="btn btn-info" onclick="$.table.exportExcel()" shiro:hasPermission="system:iotdevice:export">
		            <i class="fa fa-download"></i> 导出
		        </a>
	        </div>
	        
	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: layout-latest-js" />
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('system:iotdevice:edit')}]];
		var removeFlag = [[${@permission.hasPermi('system:iotdevice:remove')}]];
		var prefix = ctx + "system/iotdevice";

		$(function() {
			var options = {
				url: prefix + "/list",
				createUrl: prefix + "/add",
				updateUrl: prefix + "/edit/{id}",
				removeUrl: prefix + "/remove",
				exportUrl: prefix + "/export",
				modalName: "物联网设备",
				columns: [{
					checkbox: true
				},
				{
					field: 'deviceId',
					title: '设备ID',
					visible: false
				},
				{
					field: 'deviceName',
					title: '设备名称'
				},
				{
					field: 'deviceType',
					title: '设备类型',
					formatter: function(value, row, index) {
						var types = {
							'temperature': '温度传感器',
							'humidity': '湿度传感器',
							'pressure': '压力传感器',
							'other': '其他'
						};
						return types[value] || value;
					}
				},
				{
					field: 'mqttTopic',
					title: 'MQTT主题'
				},
				{
					field: 'status',
					title: '设备状态',
					formatter: function(value, row, index) {
						return value == '0' ? '<span class="label label-success">正常</span>' : '<span class="label label-danger">停用</span>';
					}
				},
				{
					field: 'createTime',
					title: '创建时间'
				},
				{
					title: '操作',
					align: 'center',
					formatter: function(value, row, index) {
						var actions = [];
						actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.deviceId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
						actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.deviceId + '\')"><i class="fa fa-remove"></i>删除</a>');
						actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="viewData(\'' + row.deviceId + '\')"><i class="fa fa-eye"></i>数据</a>');
						return actions.join('');
					}
				}]
			};
			$.table.init(options);
		});

		function viewData(deviceId) {
			var url = prefix + "/data/list?deviceId=" + deviceId;
			$.modal.openTab("设备数据", url);
		}
	</script>
</body>
</html>
