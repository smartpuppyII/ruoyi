<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('植被覆盖率分析')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>图片名称：</label>
                                <input type="text" name="imageName"/>
                            </li>
                            <li>
                                <label>设备ID：</label>
                                <input type="text" name="deviceId"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:vegetation:add">
                    <i class="fa fa-plus"></i> 图片分析
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:vegetation:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:vegetation:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:vegetation:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:vegetation:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:vegetation:remove')}]];
        var prefix = ctx + "system/vegetation";

        $(function() {
            queryVegetationList();
        });

        function queryVegetationList() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "植被分析",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'ID',
                    visible: false
                },
                {
                    field: 'imageName',
                    title: '图片名称'
                },
                {
                    field: 'coverageRate',
                    title: '覆盖率(%)',
                    formatter: function(value, row, index) {
                        try {
                            if (value === null || value === undefined || value === '') {
                                return '0.00%';
                            }
                            var numValue = parseFloat(value);
                            if (isNaN(numValue)) {
                                return '0.00%';
                            }
                            return numValue.toFixed(2) + '%';
                        } catch (e) {
                            console.error('Formatter error:', e, 'value:', value, 'type:', typeof value);
                            return '0.00%';
                        }
                    }
                },
                {
                    field: 'greenPixelCount',
                    title: '绿色像素'
                },
                {
                    field: 'totalPixelCount',
                    title: '总像素'
                },
                {
                    field: 'deviceId',
                    title: '设备ID'
                },
                {
                    field: 'analysisTime',
                    title: '分析时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        }
    </script>
</body>
</html>
