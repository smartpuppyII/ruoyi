<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - RuoYi移动端</title>
    
    <!-- iOS优化 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 移动端样式 -->
    <link th:href="@{/mobile/css/mobile.css}" rel="stylesheet"/>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="login-logo">
            <img th:src="@{/ruoyi.png}" alt="RuoYi" onerror="this.src='/img/profile.jpg'">
            <h1>RuoYi IoT</h1>
            <p style="color: rgba(255,255,255,0.8); margin-top: 10px;">智慧农业管理系统</p>
        </div>
        
        <!-- 登录表单 -->
        <div class="login-form">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i> 用户名
                    </label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="rememberMe" style="margin-right: 8px;">
                        <span style="font-size: 14px; color: #666;">记住我</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-large">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <p style="color: #999; font-size: 13px;">
                    测试账号: admin / admin123
                </p>
            </div>
        </div>
    </div>
    
    <!-- jQuery -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    
    <!-- 移动端JS -->
    <script th:src="@{/mobile/js/mobile.js(v=20251011214500)}"></script>
    
    <script>
    const ctx = '/';
    
    // 临时修复：覆盖API.login函数，直接处理响应
    if (typeof API !== 'undefined') {
        API.login = async function(username, password) {
            const response = await fetch('/mobile/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            // code为200或0都表示成功，直接返回data，不抛出错误
            console.log('Login response:', data);
            return data;
        };
    }
    
    $(function() {
        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = ctx + 'm/index';
            return;
        }
        
        // 自动填充记住的账号
        const savedUsername = localStorage.getItem('savedUsername');
        const savedPassword = localStorage.getItem('savedPassword');
        if (savedUsername) {
            $('#username').val(savedUsername);
            $('#rememberMe').prop('checked', true);
        }
        if (savedPassword) {
            $('#password').val(savedPassword);
        }
        
        // 登录表单提交
        $('#loginForm').on('submit', async function(e) {
            e.preventDefault();
            
            const username = $('#username').val().trim();
            const password = $('#password').val().trim();
            const rememberMe = $('#rememberMe').is(':checked');
            
            if (!username) {
                showToast('请输入用户名');
                return;
            }
            
            if (!password) {
                showToast('请输入密码');
                return;
            }
            
            showLoading('登录中...');
            
            try {
                const result = await API.login(username, password);
                
                console.log('Login result:', result);
                
                // 检查是否有token，有token说明登录成功
                // code为200或0都表示成功
                if (result && (result.code === 200 || result.code === 0) && result.token) {
                    // 保存登录信息
                    const token = result.token;
                    const user = result.user || { loginName: username };
                    
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    // 记住账号
                    if (rememberMe) {
                        localStorage.setItem('savedUsername', username);
                        localStorage.setItem('savedPassword', password);
                    } else {
                        localStorage.removeItem('savedUsername');
                        localStorage.removeItem('savedPassword');
                    }
                    
                    hideLoading();
                    showToast('登录成功');
                    
                    // 延迟跳转，让用户看到成功提示
                    setTimeout(() => {
                        window.location.href = ctx + 'm/index';
                    }, 500);
                } else {
                    hideLoading();
                    showToast(result.msg || '登录失败');
                }
            } catch (error) {
                hideLoading();
                console.error('Login error:', error);
                showToast(error.message || '登录失败，请检查网络连接');
            }
        });
        
        // 回车登录
        $('#username, #password').on('keypress', function(e) {
            if (e.which === 13) {
                $('#loginForm').submit();
            }
        });
    });
    </script>
</body>
</html>
