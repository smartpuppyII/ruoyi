<!DOCTYPE html>
<html>
<head>
    <title>文件上传测试</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.2.8/css/fileinput.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.2.8/js/fileinput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.2.8/js/locales/zh.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4>植被分析 - 文件上传测试</h4>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm">
                            <div class="mb-3">
                                <label for="uploadImage" class="form-label">选择图片文件：</label>
                                <input id="uploadImage" name="file" type="file" class="file" 
                                       data-show-preview="true" 
                                       data-show-upload="true" 
                                       data-show-remove="true"
                                       data-show-cancel="true"
                                       accept="image/*">
                            </div>
                        </form>
                        
                        <div id="result" class="mt-3" style="display: none;">
                            <div class="alert alert-success">
                                <h5>分析结果：</h5>
                                <p><strong>植被覆盖率：</strong><span id="coverageRate"></span></p>
                                <p><strong>绿色像素：</strong><span id="greenPixels"></span></p>
                                <p><strong>总像素：</strong><span id="totalPixels"></span></p>
                                <p><strong>分析时间：</strong><span id="analysisTime"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            $("#uploadImage").fileinput({
                language: 'zh',
                uploadUrl: 'http://localhost:8080/system/vegetation/analyze',
                uploadAsync: true,
                showPreview: true,
                showUpload: true,
                showRemove: true,
                showCancel: true,
                allowedFileExtensions: ['jpg', 'jpeg', 'png'],
                maxFileSize: 10240, // 10MB
                maxFilesNum: 1,
                uploadExtraData: function() {
                    return {};
                }
            }).on('fileuploaded', function(event, data, previewId, index) {
                console.log('上传响应:', data.response);
                var response = data.response;
                if (response.code === 0) {
                    alert("分析完成！");
                    showAnalysisResult(response.data);
                } else {
                    alert('分析失败: ' + (response.msg || '未知错误'));
                }
            }).on('fileuploaderror', function(event, data, msg) {
                console.error('上传错误:', data, msg);
                alert('上传失败: ' + msg);
            }).on('filebatchuploaderror', function(event, data, msg) {
                console.error('批量上传错误:', data, msg);
                alert('批量上传失败: ' + msg);
            });
        });

        function showAnalysisResult(data) {
            if (data) {
                $('#coverageRate').text(data.coverageRate + '%');
                $('#greenPixels').text(data.greenPixels);
                $('#totalPixels').text(data.totalPixels);
                $('#analysisTime').text(new Date(data.analysisTime).toLocaleString());
                $('#result').show();
            }
        }
    </script>
</body>
</html>
