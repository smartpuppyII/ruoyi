<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植被分析测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.2.8/css/fileinput.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.2.8/js/fileinput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.2.8/js/locales/zh.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">植被覆盖率分析测试</h4>
                    </div>
                    <div class="card-body">
                        <form id="vegetationForm">
                            <div class="mb-3">
                                <label for="deviceId" class="form-label">设备ID（可选）：</label>
                                <input type="number" class="form-control" id="deviceId" placeholder="输入设备ID">
                            </div>
                            
                            <div class="mb-3">
                                <label for="uploadImage" class="form-label">选择图片：</label>
                                <input id="uploadImage" name="file" type="file" class="file" accept="image/*">
                                <div class="form-text">支持 JPG、JPEG、PNG 格式，大小不超过10MB</div>
                            </div>
                            
                            <div class="mb-3">
                                <button type="button" class="btn btn-primary" id="analyzeBtn" disabled>
                                    <i class="fa fa-upload"></i> 开始分析
                                </button>
                            </div>
                        </form>
                        
                        <div id="analysisResult" class="mt-4" style="display: none;">
                            <h5>分析结果：</h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h6 class="card-title">植被覆盖率</h6>
                                            <h3 class="text-success" id="coverageRate">0.00%</h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h6 class="card-title">像素统计</h6>
                                            <p class="mb-1">绿色像素：<span id="greenPixels">0</span></p>
                                            <p class="mb-0">总像素：<span id="totalPixels">0</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-3">
                                <small class="text-muted">分析时间：<span id="analysisTime"></span></small>
                            </div>
                        </div>
                        
                        <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;">
                            <strong>错误：</strong><span id="errorText"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            // 初始化文件上传
            $("#uploadImage").fileinput({
                language: 'zh',
                uploadUrl: 'http://localhost:8080/system/vegetation/analyze',
                uploadAsync: true,
                showPreview: true,
                showUpload: false,
                showRemove: true,
                showCancel: true,
                allowedFileExtensions: ['jpg', 'jpeg', 'png'],
                maxFileSize: 10240, // 10MB
                maxFilesNum: 1,
                uploadExtraData: function() {
                    return {
                        deviceId: $('#deviceId').val() || null
                    };
                }
            })
            .on('fileselect', function() { 
                $('#analyzeBtn').prop('disabled', false); 
            })
            .on('fileloaded', function() { 
                $('#analyzeBtn').prop('disabled', false); 
            })
            .on('fileclear', function() {
                $('#analyzeBtn').prop('disabled', true);
                $('#analysisResult').hide();
                $('#errorMessage').hide();
            })
            .on('fileuploaded', function(event, data, previewId, index) {
                console.log('上传响应:', data.response);
                var response = data.response;
                if (response && response.code === 0) {
                    showAnalysisResult(response.data);
                    $('#errorMessage').hide();
                } else {
                    showError('分析失败: ' + (response ? response.msg : '未知错误'));
                }
                $('#analyzeBtn').prop('disabled', false);
            })
            .on('fileuploaderror', function(event, data, msg) {
                console.error('上传错误:', data, msg);
                var errorMsg = '上传失败: ' + msg;
                if (data && data.jqXHR && data.jqXHR.responseJSON && data.jqXHR.responseJSON.msg) {
                    errorMsg = '上传失败: ' + data.jqXHR.responseJSON.msg;
                }
                showError(errorMsg);
                $('#analyzeBtn').prop('disabled', false);
            });

            // 手动分析按钮
            $('#analyzeBtn').click(function() {
                var fileInput = document.getElementById('uploadImage');
                if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                    showError('请先选择图片');
                    return;
                }
                
                var formData = new FormData();
                formData.append('file', fileInput.files[0]);
                var devId = $('#deviceId').val();
                if (devId) formData.append('deviceId', devId);

                $(this).prop('disabled', true);
                $('#errorMessage').hide();

                $.ajax({
                    url: 'http://localhost:8080/system/vegetation/analyze',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(resp) {
                        console.log('分析响应:', resp);
                        if (resp && resp.code === 0) {
                            showAnalysisResult(resp.data);
                        } else {
                            showError('分析失败: ' + (resp ? resp.msg : '未知错误'));
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('AJAX错误:', xhr, status, error);
                        var errorMsg = '网络错误: ' + error;
                        if (xhr.responseJSON && xhr.responseJSON.msg) {
                            errorMsg = '服务器错误: ' + xhr.responseJSON.msg;
                        } else if (xhr.status === 500) {
                            errorMsg = '服务器内部错误 (500)';
                        } else if (xhr.status === 404) {
                            errorMsg = '接口不存在 (404)';
                        } else if (xhr.status === 403) {
                            errorMsg = '权限不足 (403)';
                        }
                        showError(errorMsg);
                    },
                    complete: function() {
                        $('#analyzeBtn').prop('disabled', false);
                    }
                });
            });
        });

        function showAnalysisResult(data) {
            if (data) {
                $('#coverageRate').text((data.coverageRate || 0).toFixed(2) + '%');
                $('#greenPixels').text(data.greenPixelCount || 0);
                $('#totalPixels').text(data.totalPixelCount || 0);
                $('#analysisTime').text(new Date(data.analysisTime || new Date()).toLocaleString());
                $('#analysisResult').show();
            }
        }

        function showError(message) {
            $('#errorText').text(message);
            $('#errorMessage').show();
            $('#analysisResult').hide();
        }
    </script>
</body>
</html>
