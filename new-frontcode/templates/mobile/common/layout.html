<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title th:text="${title} ?: 'RuoYi移动端'">RuoYi移动端</title>
    
    <!-- iOS优化 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RuoYi">
    
    <!-- Android优化 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007aff">
    
    <!-- 图标 -->
    <link rel="icon" th:href="@{/favicon.ico}">
    <link rel="apple-touch-icon" th:href="@{/ruoyi.png}">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 移动端样式 -->
    <link th:href="@{/mobile/css/mobile.css}" rel="stylesheet"/>
    
    <script th:inline="javascript">
        var ctx = [[@{/}]];
    </script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="mobile-header" th:if="${showHeader != false}">
        <div class="header-left">
            <i class="back-btn fas fa-arrow-left" th:if="${showBack != false}"></i>
        </div>
        <div class="header-title" th:text="${title}">标题</div>
        <div class="header-right">
            <th:block th:replace="${headerAction}" />
        </div>
    </header>
    
    <!-- 主内容区域 -->
    <main class="mobile-content" th:classappend="${showFooter == false} ? 'no-footer' : ''">
        <th:block th:replace="${content}" />
    </main>
    
    <!-- 底部导航栏 -->
    <nav class="mobile-footer" th:if="${showFooter != false}">
        <a class="footer-item" th:href="@{/m/index}">
            <i class="footer-icon fas fa-home"></i>
            <span>首页</span>
        </a>
        <a class="footer-item" th:href="@{/m/device/list}">
            <i class="footer-icon fas fa-microchip"></i>
            <span>设备</span>
        </a>
        <a class="footer-item" th:href="@{/m/vegetation/list}">
            <i class="footer-icon fas fa-leaf"></i>
            <span>植被</span>
        </a>
        <a class="footer-item" th:href="@{/m/profile}">
            <i class="footer-icon fas fa-user"></i>
            <span>我的</span>
        </a>
    </nav>
    
    <!-- jQuery -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    
    <!-- 移动端JS -->
    <script th:src="@{/mobile/js/mobile.js}"></script>
    
    <!-- 页面特定脚本 -->
    <th:block th:replace="${scripts}" />
</body>
</html>
